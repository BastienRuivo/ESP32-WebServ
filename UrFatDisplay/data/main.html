<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Real-Time Weight Chart</title>
    <style>
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1e1e24;
            overflow-x: hidden; /* Avoid horizontal scrollbar bugs */
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            color: #fff;
            
            /* 2. Flexbox forces the container to fill the structural body boundaries */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 100%; /* Override your previous 700px limit */
            min-height: 100vh; /* Stands for 100% of Viewport Height */
            
            background: #2a2a35;
            padding: 20px;
            box-shadow: none; /* Shadow becomes obsolete on full-screen layout */
            border-radius: 0; /* Remove rounded corners since it edges the screen */
            
            /* Box-sizing ensures padding calculations are done internally */
            box-sizing: border-box; 
            
            display: flex;
            flex-direction: column;
            justify-content: space-around; /* Distributes items nicely across full height */
            align-items: center;
        }
        .weightLoss {
            color: #00e676 !important
        }
        .weightGain {
            color:  #ff1744 !important
        }
        #measurement {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #aaaaca;
        }
        canvas {
            background: #15151a;
            border-radius: 6px;
            width: 100%;
            max-width: 900px; /* Prevents the chart from stretching infinitely on wide desktop displays */
            height: auto;
            aspect-ratio: 4 / 3;
        }
        @media (min-width: 600px) {
            canvas {
                /* Wide Landscape aspect ratio for tablet and desktop viewports */
                aspect-ratio: 2 / 1; 
            }
        }
        @media (max-width: 480px) {
            #measurement {
                /* Drop the font size slightly on mobile so the whole line fits */
                font-size: 1.1rem; 
            }
        }
        #tooltip {
            position: absolute;
            background: rgba(20, 20, 25, 0.9);
            border: 1px solid #3a3a45;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            text-align: left;
            pointer-events: none; /* Empêche le tooltip d'interférer avec la souris */
            opacity: 0;
            transition: opacity 0.15s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .tt-title { color: #8a8a95; font-size: 0.75rem; margin-bottom: 4px; }
        .tt-text { color: #aaaaca; font-weight: bold; }
        .btn {
            background-color: #0033ff;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn:hover {
            background-color: #0091ea;
        }
        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="margin-bottom: 20px;">
            <button id="sendBtn" class="btn">Capture</button>
        </div>
        <div id="measurement">
            <p><span id="vDate">--:--:--</span></p>
            <p><span id="vWeight">0.00</span> kg</p>
            <p>Diff <span id="vDelta">0.00</span> g - Mois <span id="vDeltaMonth">0.00</span> g</p>
        </div>
        <canvas id="chart" width="600" height="300"></canvas>
    </div>

    <script>
        const ClassNames =
        {
            WEIGHT_LOSS : 'weightLoss',
            WEIGHT_GAIN : 'weightGain'
        };
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        const MAX_HISTORY_POINTS = 30; // Number of data points visible on screen at once
        let _dataHistory = []; // Stores objects: { time: string, value: float }
        let _balanceData = null;
        let _dataToPush = null; // here because balance data underlying ref can change between the request is send and it's reponse
        let _historyCount = 0;
        let _globActivePoint = null;

        // Initialize SSE Connection
        const source = new EventSource('/events');

        function LoadData(data)
        {
            return {
                    date : new Date(data.date),
                    weight : parseFloat(data.weight),
                    delta : 0,
                    x : 0,
                    y : 0
                }
        }

        function LoadHistory(datas, count)
        {
            _dataHistory = datas.map(element => LoadData(element));
            _historyCount = count;

            for(let i = 1; i < _historyCount; ++i)
            {
                _dataHistory[i].delta = _dataHistory[i].weight - _dataHistory[i - 1].weight;
            }

            DrawLineChart();

            if(_historyCount > 0)
            {
                const deltaMonth = _dataHistory[_historyCount - 1].weight - _dataHistory[0].weight;
                const color = Math.abs(deltaMonth) >= 1e-1 ? (deltaMonth > 0.0 ? ClassNames.WEIGHT_GAIN : ClassNames.WEIGHT_LOSS) : '';
                SetValue('vDeltaMonth', Math.round(deltaMonth * 10) * 100, color);
            }
        }

        function formatTime(time)
        {
            return time < 10 ? '0' + time : time;
        }

        function GetDateString(date)
        {
            let year = date.getUTCFullYear();
            return formatTime(date.getUTCDate()) + "-" + formatTime(date.getUTCMonth() + 1) + "-" + String(Math.abs(year - 2000));
        }

        function GetTimeString(date)
        {
            let year = date.getUTCFullYear();
            return formatTime(date.getUTCHours()) + ":" + formatTime(date.getUTCMinutes()) + ":" + formatTime(date.getUTCSeconds());
        }

        function SetValue(id, value, colorClass)
        {
            let valueDoc = document.getElementById(id);
            valueDoc.textContent = value;
            valueDoc.classList.remove(ClassNames.WEIGHT_LOSS, ClassNames.WEIGHT_GAIN);
            if(colorClass != '') valueDoc.classList.add(colorClass);
        }

        function ShowBalanceData(data, lastHistory) {
            if(lastHistory != null)
            {
                const delta = data.weight - lastHistory.weight;
                data.delta = delta;  //dddd
                const color = Math.abs(delta) >= 1e-1 ? (delta > 0.0 ? ClassNames.WEIGHT_GAIN : ClassNames.WEIGHT_LOSS) : '';
                let deltaStr = Math.round(delta * 10) * 100;
                deltaStr = deltaStr > 0 ? '+' + deltaStr : deltaStr; 
                SetValue('vDelta', deltaStr, color);
            }

            SetValue('vDate', GetDateString(data.date) + " " + GetTimeString(data.date), 0);
            SetValue('vWeight', data.weight.toFixed(1), 0);

            _balanceData = data;
        }

        function DrawLineChart() {
            // Clear canvas canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (_dataHistory.length === 0) return;

            const displayWidth = canvas.clientWidth;
            const displayHeight = canvas.clientHeight;

            // Synchronize the internal drawing resolution to prevent blurriness or compression
            if (canvas.width !== displayWidth || canvas.height !== displayHeight) {
                canvas.width = displayWidth;
                canvas.height = displayHeight;
            }

            const currentAspectRatio = canvas.width / canvas.height;
            const isTinyDevice = currentAspectRatio < 1.5;
            const AbscisseDateCount = isTinyDevice ? 4 : 8;

            // Clear the workspace canvas frame using the newly aligned dimensions
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const padding = isTinyDevice ? 20 : 40;
            const chartWidth = canvas.width - padding * 2;
            const chartHeight = canvas.height - padding * 2;

            // Find dynamic min/max bounds for proper scaling
            let values = _dataHistory.map(d => d.weight);
            let maxVal = Math.max(...values, 90) + 5;
            let minVal = Math.min(...values, 0) - 5;
            if (minVal < 0) minVal = 0; 

            const valRange = maxVal - minVal;

            // Draw Background Grid Lines
            ctx.strokeStyle = '#3a3a45';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                let y = padding + (chartHeight / 4) * i;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(canvas.width - padding, y);
                ctx.stroke();
                
                // Draw Y-axis labels (kg value)
                ctx.fillStyle = '#8a8a95';
                ctx.font = '10px Arial';
                let lbl = (maxVal - (valRange / 4) * i).toFixed(1) + "kg";
                const up =  + isTinyDevice ? (10 * (i == 4 )) : 0;
                ctx.fillText(lbl, 5, y + 3 - up);
            }

            // Draw Chart Line Path
            ctx.beginPath();
            ctx.strokeStyle = '#00b0ff'; // Cyan line color
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';

            const startDate = _dataHistory[0].date;
            const endDate = _dataHistory[_dataHistory.length - 1].date;

            const startTime = startDate.getTime();
            const endTime = endDate.getTime();
            const dateSize = Math.max(endTime - startTime, 1.0) // avoid div by 0

            for (let i = 0; i < _dataHistory.length; i++) 
            {
                let currentDate = (_dataHistory[i].date.getTime() - startTime) / dateSize;

                let x = padding + currentDate * chartWidth;
                let y = padding + chartHeight - ((_dataHistory[i].weight - minVal) / valRange) * chartHeight;

                _dataHistory[i].x = x;
                _dataHistory[i].y = y;

                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            for (let i = 0; i < _dataHistory.length; i++) 
            {
                let currentDate = (_dataHistory[i].date.getTime() - startTime) / dateSize;
                
                let x = padding + currentDate * chartWidth;
                let y = padding + chartHeight - ((_dataHistory[i].weight - minVal) / valRange) * chartHeight;

                ctx.beginPath();
                let radius = 4;
                if(_globActivePoint != null && _globActivePoint.x == x)
                {
                    radius = 8;
                }
                ctx.fillStyle = '#ff1744';
                ctx.arc(x, y, radius, 0, 2 * Math.PI);
                ctx.fill();
            }

            for(let i = 0; i < AbscisseDateCount; ++i)
            {
                let currentDateTime = i / (AbscisseDateCount);
                let currentDate = new Date(startTime + currentDateTime * dateSize);

                let x = padding + currentDateTime * chartWidth;
                ctx.fillStyle = '#8a8a95';
                ctx.font = '10px Arial';
                ctx.save();
                ctx.translate(x + 20, canvas.height - 15);
                ctx.fillText(GetDateString(currentDate), -20, 0);
                ctx.fillText(GetTimeString(currentDate), -20, 10);
                ctx.restore();
            }
        }

        canvas.addEventListener('mousemove', function(evt) {
            const rect = canvas.getBoundingClientRect();

            const mouseX = (evt.clientX - rect.left) * (canvas.width / rect.width);
            const mouseY = (evt.clientY - rect.top) * (canvas.height / rect.height);

            let activePoint = null;

            for (let i = 0; i < _dataHistory.length; i++) {
                const p = _dataHistory[i];
                const distance = Math.pow(mouseX - p.x, 2);
                if (distance < 100) { // note it's squared distance here
                    activePoint = p;
                    break;
                }
            }

            if(activePoint != null)
            {
                tooltip.innerHTML = `
                    <div class="tt-title">Date : ${GetDateString(activePoint.date) + " " + GetTimeString(activePoint.date)}</div>
                    <div>Poids : ${activePoint.weight.toFixed(2)} kg</div>
                    <div>Delta : ${Math.round(activePoint.delta * 10) * 100} g</div>
                `;

                if(activePoint != _globActivePoint)
                {
                    _globActivePoint = activePoint;
                    DrawLineChart();
                }

                tooltip.style.left = (evt.pageX + 5) + 'px';
                tooltip.style.top = (evt.pageY) + 'px';
                tooltip.style.opacity = '1';
            } else {
                tooltip.style.opacity = '0';
            }
        });

        canvas.addEventListener('mouseleave', function() {
            tooltip.style.opacity = '0';
            _globActivePoint = null;
            DrawLineChart();
        });
        
        window.addEventListener('DOMContentLoaded', () => {
            fetch('/history')
                .then(response => {
                    if (!response.ok) throw new Error("Can't retrieve history");
                    return response.json();
                })
                .then(json => {
                    console.log(`Found history: ${json.count}`);
                    console.log(json);
                    if (json.data && json.data.length > 0) {
                        LoadHistory(json.data, json.count);
                    }
                    
                    ListenUpdate();
                })
                .catch(err => {
                    console.error(err);
                    ListenUpdate();
                });
        });

        function ListenUpdate() {
            console.log("Subscribing to addPoint...");
            const source = new EventSource('/events');
            source.addEventListener('sensor-addPoint', function(e) {
                try {
                    const payload = JSON.parse(e.data);
                    const data = LoadData(payload);

                    let lastData = null;
                    if(_historyCount > 0)
                    {
                        lastData = _dataHistory[_historyCount - 1];
                    } 
                    ShowBalanceData(data, lastData);
                } catch (err) {
                    console.error("Failed to parse incoming stream data payload:", err);
                }
            }, false);
        }

        document.getElementById('sendBtn').addEventListener('click', function() {
            console.log("Sending data...");
            if(_balanceData == null) return;
            const button = this;
            button.disabled = true;
            button.textContent = "Sending...";

            _dataToPush = { 
                ..._balanceData, 
                date: new Date() 
            };

            fetch('/submit-data', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    date: new Date().getTime(),
                    weight: _dataToPush.weight
                })
            })
            .then(response => {
                if (response.ok) {
                    console.log("Successfully sent data");
                    _dataHistory.push({..._dataToPush});
                    _historyCount++;
                    _dataToPush = null;
                    if(_historyCount >= MAX_HISTORY_POINTS)
                    {
                        _dataHistory.shift();
                        console.log("SHIFT");
                    }
                    DrawLineChart();
                } else {
                    throw new Error("Server error (error " + response.status + ")");
                }
            })
            .catch(err => {
                console.error("Can't send data :", err);
            })
            .finally(final => {
                const button = this;
                button.disabled = false;
                button.textContent = "Capture";
            });
        });

    </script>


    <div id="tooltip"></div>
</body>
</html>
